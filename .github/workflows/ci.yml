name: CI

on:
  pull_request:
    branches: [dev, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/shared
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: Format check
        run: uv run ruff format --check . ../backend ../scheduler ../worker-manager

      - name: Lint
        run: uv run ruff check . ../backend ../scheduler ../worker-manager

      - name: Type check
        run: |
          uv run python -m mypy .
          uv run python -m mypy ../backend
          uv run python -m mypy ../scheduler
          uv run python -m mypy ../worker-manager

      - name: Tests
        run: uv run python -m pytest --tb=short -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/frontend
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: SvelteKit sync (generate .svelte-kit/tsconfig.json)
        run: bun run svelte-kit sync

      - name: Codegen
        run: bun run panda:codegen

      - name: Svelte check
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test:unit

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'master'
    permissions:
      contents: read
    env:
      PORT: '8001'
      FRONTEND_PORT: '3001'
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend dependencies
        working-directory: packages/shared
        run: uv sync

      - name: Install frontend dependencies
        working-directory: packages/frontend
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: packages/frontend
        run: bun x playwright install --with-deps chromium

      - name: Start runtime
        working-directory: packages/shared
        run: |
          set -a; source e2e.env; set +a
          PYTHONPATH="../backend:../scheduler:../worker-manager:." uv run --no-env-file ../backend/main.py &
          PYTHONPATH="../backend:../scheduler:../worker-manager:." uv run --no-env-file ../scheduler/main.py &
          PYTHONPATH="../backend:../scheduler:../worker-manager:." uv run --no-env-file ../worker-manager/main.py &

      - name: Start frontend
        working-directory: packages/frontend
        run: bun run dev &

      - name: Wait for services
        run: |
          for i in {1..90}; do
            if curl -sf http://localhost:8001/health > /dev/null && curl -sf http://localhost:3001 > /dev/null; then
              echo "Services ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for services" >&2
          exit 1

      - name: Run e2e tests
        run: just test-e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/frontend/tests/playwright-report/
          retention-days: 7
