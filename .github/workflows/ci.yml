name: CI

on:
  pull_request:
    branches: [dev, master]
  push:
    branches: [dev, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/shared
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: Format check
        run: uv run ruff format --check . ../backend ../scheduler ../worker-manager

      - name: Lint
        run: uv run ruff check . ../backend ../scheduler ../worker-manager

      - name: Type check
        run: |
          uv run python -m mypy .
          uv run python -m mypy ../backend
          uv run python -m mypy ../scheduler
          uv run python -m mypy ../worker-manager

      - name: Tests
        run: uv run python -m pytest -c pyproject.toml --tb=short -q ../backend/tests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/frontend
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: taiki-e/install-action@just

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: SvelteKit sync (generate .svelte-kit/tsconfig.json)
        run: bun run svelte-kit sync

      - name: Codegen
        run: bun run panda:codegen

      - name: Svelte check
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test:unit

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'master'
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      PORT: '8001'
      FRONTEND_PORT: '3001'
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: taiki-e/install-action@just

      - name: Install backend dependencies
        working-directory: packages/shared
        run: uv sync

      - name: Install frontend dependencies
        working-directory: packages/frontend
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: packages/frontend
        run: bun x playwright install chromium

      - name: Run e2e tests
        run: |
          set -o pipefail
          mkdir -p packages/frontend/tests/ci-artifacts
          export E2E_LOG_DIR="$PWD/packages/frontend/tests/ci-artifacts/services"
          just test-e2e 2>&1 | tee packages/frontend/tests/ci-artifacts/e2e.log
          status=${PIPESTATUS[0]}
          if [ "$status" -eq 124 ]; then
            echo "e2e step hit the shared 27 minute harness timeout before the 30 minute job timeout"
          fi
          exit "$status"

  publish-images:
    if: github.event_name == 'push' && (github.ref_name == 'dev' || github.ref_name == 'master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: data-forge-api
            target: api
          - image_name: data-forge-scheduler
            target: scheduler
          - image_name: data-forge-worker
            target: worker
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: tags
        run: |
          short_sha="${GITHUB_SHA::12}"
          branch_tag="${GITHUB_REF_NAME}"
          {
            echo 'tags<<EOF'
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/${{ matrix.image_name }}:${branch_tag}"
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/${{ matrix.image_name }}:sha-${short_sha}"
            if [ "$GITHUB_REF_NAME" = "master" ]; then
              echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/${{ matrix.image_name }}:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}

