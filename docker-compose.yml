version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: polars-analysis:latest
    container_name: polars-analysis

    ports:
      - "${PORT:-8000}:8000"

    environment:
      # Application Configuration
      - APP_NAME=${APP_NAME:-Data-Forge Analysis Platform}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - DEBUG=${DEBUG:-false}

      # Database
      - DATABASE_URL=${DATABASE_URL:-sqlite:///${DATA_DIR:-/app/data}/app.db}

      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}

      - DATA_DIR=${DATA_DIR:-/app/data}
      - DEFAULT_NAMESPACE=${DEFAULT_NAMESPACE:-default}
      - UPLOAD_CHUNK_SIZE=${UPLOAD_CHUNK_SIZE:-5242880}

      # Polars Engine Resource Configuration
      - POLARS_MAX_THREADS=${POLARS_MAX_THREADS:-0}
      - POLARS_MAX_MEMORY_MB=${POLARS_MAX_MEMORY_MB:-0}
      - POLARS_STREAMING_CHUNK_SIZE=${POLARS_STREAMING_CHUNK_SIZE:-0}
      - MAX_CONCURRENT_ENGINES=${MAX_CONCURRENT_ENGINES:-10}

      # Worker Configuration
      - WORKERS=${WORKERS:-2}
      - WORKER_CONNECTIONS=${WORKER_CONNECTIONS:-1000}
      - TIMEOUT=${TIMEOUT:-30}
      - KEEPALIVE=${KEEPALIVE:-5}
      - GRACEFUL_TIMEOUT=${GRACEFUL_TIMEOUT:-10}

      # Engine Lifecycle
      - ENGINE_IDLE_TIMEOUT=${ENGINE_IDLE_TIMEOUT:-300}

      # Job Management
      - JOB_TIMEOUT=${JOB_TIMEOUT:-300}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PROD_MODE_ENABLED=true
    volumes:
      # Persist data directory
      - data:/app/data
      # Persist database
      - database:/app/backend/database

    restart: unless-stopped

    # healthcheck:
    #   test:
    #     [
    #       "CMD",
    #       "python",
    #       "-c",
    #       "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)",
    #     ]
    #   interval: 30s
    #   timeout: 3s
    #   retries: 3
    #   start_period: 10s

    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "1.0"
          memory: 2G

volumes:
  data:
    driver: local
  database:
    driver: local
