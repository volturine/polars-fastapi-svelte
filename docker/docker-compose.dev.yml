services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DF_POSTGRES_DB}
      POSTGRES_USER: ${DF_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DF_POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DF_POSTGRES_USER} -d ${DF_POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    image: ${DF_API_IMAGE}
    depends_on:
      postgres:
        condition: service_healthy
    environment: &app-env
      ENV_FILE: ""
      APP_NAME: ${DF_APP_NAME}
      APP_VERSION: ${DF_APP_VERSION}
      DEBUG: "true"
      PROD_MODE_ENABLED: "false"
      DATA_DIR: ${DF_DATA_DIR}
      DATABASE_URL: ${DF_DATABASE_URL}
      DISTRIBUTED_RUNTIME_ENABLED: "true"
      DATABASE_POOL_SIZE: ${DF_DATABASE_POOL_SIZE}
      DATABASE_MAX_OVERFLOW: ${DF_DATABASE_MAX_OVERFLOW}
      DATABASE_POOL_TIMEOUT: ${DF_DATABASE_POOL_TIMEOUT}
      CORS_ORIGINS: ${DF_CORS_ORIGINS}
      DEFAULT_NAMESPACE: ${DF_DEFAULT_NAMESPACE}
      UPLOAD_CHUNK_SIZE: ${DF_UPLOAD_CHUNK_SIZE}
      POLARS_MAX_THREADS: ${DF_POLARS_MAX_THREADS}
      POLARS_MAX_MEMORY_MB: ${DF_POLARS_MAX_MEMORY_MB}
      POLARS_STREAMING_CHUNK_SIZE: ${DF_POLARS_STREAMING_CHUNK_SIZE}
      MAX_CONCURRENT_ENGINES: ${DF_MAX_CONCURRENT_ENGINES}
      WORKERS: "1"
      WORKER_CONNECTIONS: ${DF_WORKER_CONNECTIONS}
      BUILD_WORKER_MIN_PROCESSES: ${DF_BUILD_WORKER_MIN_PROCESSES}
      BUILD_WORKER_MAX_PROCESSES: ${DF_BUILD_WORKER_MAX_PROCESSES}
      BUILD_WORKER_IDLE_EXIT_SECONDS: ${DF_BUILD_WORKER_IDLE_EXIT_SECONDS}
      JOB_TIMEOUT: ${DF_JOB_TIMEOUT}
      SCHEDULER_CHECK_INTERVAL: ${DF_SCHEDULER_CHECK_INTERVAL}
      LOG_LEVEL: ${DF_LOG_LEVEL}
      TRUSTED_PROXY_HOPS: ${DF_TRUSTED_PROXY_HOPS}
      AUTH_REQUIRED: ${DF_AUTH_REQUIRED}
      VERIFY_EMAIL_ADDRESS: ${DF_VERIFY_EMAIL_ADDRESS}
      DEFAULT_USER_EMAIL: ${DF_DEFAULT_USER_EMAIL}
      DEFAULT_USER_PASSWORD: ${DF_DEFAULT_USER_PASSWORD}
      DEFAULT_USER_NAME: ${DF_DEFAULT_USER_NAME}
      SETTINGS_ENCRYPTION_KEY: ${DF_SETTINGS_ENCRYPTION_KEY}
      UVICORN_ACCESS_LOG: "true"
      AUTH_FRONTEND_URL: ${DF_AUTH_FRONTEND_URL}
      GOOGLE_CLIENT_ID: ${DF_GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${DF_GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${DF_GOOGLE_REDIRECT_URI}
      GITHUB_CLIENT_ID: ${DF_GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${DF_GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URI: ${DF_GITHUB_REDIRECT_URI}
    ports:
      - "${DF_API_PORT}:8000"
    volumes:
      - data:/app/data
      - ../packages/:/app/packages/
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys,urllib.request; sys.exit(0 if
            urllib.request.urlopen('http://localhost:8000/health/ready').status\
            ==200 else 1)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  scheduler:
    image: ${DF_SCHEDULER_IMAGE}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      <<: *app-env
      WORKERS: "1"
    volumes:
      - data:/app/data
      - ../packages/:/app/packages/

  worker:
    image: ${DF_WORKER_IMAGE}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      <<: *app-env
      WORKERS: "1"
    volumes:
      - data:/app/data
      - ../packages/:/app/packages/

  frontend:
    image: oven/bun:1
    working_dir: /app/packages/frontend
    depends_on:
      api:
        condition: service_started
    environment:
      FRONTEND_PORT: ${DF_FRONTEND_PORT}
      BACKEND_HOST: api
      BACKEND_PORT: "8000"
      VITE_BACKEND_PORT: "8000"
    ports:
      - "${DF_FRONTEND_PORT}:${DF_FRONTEND_PORT}"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const port = process.env.FRONTEND_PORT; const res = await fetch('http://127.0.0.1:' + port); if (!res.ok) process.exit(1);",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - ../packages/frontend:/app/packages/frontend
      - frontend-node-modules:/app/packages/frontend/node_modules
      - frontend-svelte-kit:/app/packages/frontend/.svelte-kit
    command:
      [
        "sh",
        "-lc",
        "bun install --frozen-lockfile && bun run dev --host 0.0.0.0 --port ${DF_FRONTEND_PORT}",
      ]

volumes:
  data:
    driver: local
  frontend-node-modules:
    driver: local
  frontend-svelte-kit:
    driver: local
  pg-data:
    driver: local
