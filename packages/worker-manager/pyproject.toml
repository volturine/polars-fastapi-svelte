[project]
name = "dataforge-worker-manager"
version = "1.0.0"
description = "Data-Forge worker manager runtime package"
requires-python = ">=3.11"
dependencies = ["dataforge-shared"]

[tool.uv.sources]
dataforge-shared = { path = "../shared", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["compute_core", "compute_operations"]
include = ["*.py"]
